{% extends 'blog/base.html' %}

{% block title %}Logout - MyBlog{% endblock %}

{% block content %}

<div class="auth-wrap">
    <div class="auth-box" style="max-width: 400px; text-align: center;">

        <div style="font-size: 3rem; margin-bottom: 16px;">👋</div>

        <div class="auth-brand">My<span>Blog</span></div>
        <div class="auth-subtitle">Are you sure you want to logout?</div>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-login" style="background: #c8392b;">
                Yes, Logout
            </button>
        </form>

        <div class="auth-footer" style="margin-top: 16px;">
            Changed your mind? <a href="{% url 'blog-home' %}">Go back home</a>
        </div>

    </div>
</div>

{% endblock %}
